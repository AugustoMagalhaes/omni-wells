{% if error is defined and error %}
<div class="error-box on">{{ error }}</div>
{% endif %}

{% if result is defined and result %}
<div class="result-card on" id="result-data" data-result='{{ result | tojson }}'>
    <div class="result-header">
        <span>Matching result</span>
        <span class="result-count">{{ result|length }} pair(s)</span>
    </div>
    <div class="result-grid">
        {% for prod, inj in result %}
        <div class="result-pair">
            <span class="rp-prod">{{ prod }}</span>
            <span class="rp-arrow">→</span>
            <span class="rp-inj">{{ inj }}</span>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
